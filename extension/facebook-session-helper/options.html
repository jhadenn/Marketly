<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Marketly Helper</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #09090b;
        --panel: rgba(24, 24, 27, 0.9);
        --border: rgba(255, 255, 255, 0.12);
        --text: #f4f4f5;
        --muted: #a1a1aa;
        --accent: #f5f5f5;
        --danger: #fca5a5;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(255,255,255,0.08), transparent 28%),
          radial-gradient(circle at bottom right, rgba(56,189,248,0.12), transparent 30%),
          var(--bg);
        color: var(--text);
        font: 14px/1.5 "Segoe UI", sans-serif;
      }
      .shell {
        max-width: 880px;
        margin: 0 auto;
        padding: 32px 20px 40px;
      }
      .panel {
        border: 1px solid var(--border);
        background: var(--panel);
        border-radius: 24px;
        padding: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(14px);
      }
      .grid {
        display: grid;
        gap: 16px;
      }
      .grid.two {
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      }
      label {
        display: block;
        font-size: 11px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 8px;
      }
      input, textarea {
        width: 100%;
        box-sizing: border-box;
        border-radius: 18px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        padding: 12px 14px;
        outline: none;
      }
      textarea {
        min-height: 96px;
        resize: vertical;
      }
      button {
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        font: inherit;
        cursor: pointer;
        color: #111;
        background: var(--accent);
      }
      button.secondary {
        color: var(--text);
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid var(--border);
      }
      button.danger {
        color: var(--danger);
        background: rgba(248, 113, 113, 0.12);
        border: 1px solid rgba(248, 113, 113, 0.28);
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      .muted {
        color: var(--muted);
      }
      .status {
        white-space: pre-wrap;
        border-radius: 18px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.03);
        padding: 14px;
        color: var(--muted);
      }
      code {
        font-family: Consolas, monospace;
      }
      h1, h2, p {
        margin: 0;
      }
      h1 {
        font-size: 28px;
        line-height: 1.1;
      }
      h2 {
        font-size: 16px;
        margin-bottom: 10px;
      }
      .stack {
        display: grid;
        gap: 18px;
      }
    </style>
  </head>
  <body>
    <main class="shell stack">
      <section class="panel stack">
        <p class="muted">Marketly Facebook Session Helper</p>
        <h1>Pair once, then let the helper keep Facebook fresh.</h1>
        <p class="muted">
          Paste the API base and pairing code from Marketly. After pairing, this helper syncs only
          <code>facebook.com</code> cookies. It does not read Facebook page content.
        </p>
      </section>

      <section class="panel grid two">
        <div>
          <label for="api-base">API Base</label>
          <input id="api-base" placeholder="https://your-marketly-api.example.com" />
        </div>
        <div>
          <label for="pairing-code">Pairing Code</label>
          <input id="pairing-code" placeholder="Paste the one-time code from Marketly" />
        </div>
      </section>

      <section class="panel stack">
        <div class="actions">
          <button id="pair-helper">Pair helper</button>
          <button id="sync-now" class="secondary">Sync now</button>
          <button id="forget-helper" class="danger">Forget local token</button>
        </div>
        <div id="status" class="status">Loading helper state...</div>
      </section>
    </main>
    <script src="options.js"></script>
  </body>
  </html>
